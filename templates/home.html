<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard</title>
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-color: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --radius: 12px;
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
      --input-focus: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 24px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 48px;
    }

    h1 {
      margin: 0 0 24px 0;
      font-size: 28px;
      font-weight: 600;
      color: var(--text-color);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-color);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-color);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    button {
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-secondary {
      background-color: #f1f5f9;
      color: var(--text-color);
    }

    .btn-secondary:hover {
      background-color: #e2e8f0;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 20px;
      }

      .actions {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Reports</h1>
    <div class="form-group">
      <label for="year">Year</label>
      <input id="year" type="number" placeholder="2026" />
    </div>
    <div class="form-group">
      <label for="month">Month</label>
      <input id="month" type="number" placeholder="1" min="1" max="12" />
    </div>
    <div class="actions">
      <button type="button" class="btn-primary" onclick="openReport()">Open Report</button>
      <button type="button" class="btn-secondary" onclick="openRates()">Open Rates</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      document.getElementById('year').value = now.getFullYear();
      document.getElementById('month').value = now.getMonth() + 1;
    });

    function openReport() {
      const year = document.getElementById('year').value;
      const month = document.getElementById('month').value;
      if (!year || !month) {
        alert('Year and month are required');
        return;
      }
      let url = `/report/${year}/${month}`;
      window.location.href = url;
    }

    function openRates() {
      window.location.href = '/rates-ui';
    }
  </script>
</body>

</html>
