<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rates</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      table { border-collapse: collapse; width: 100%; margin-top: 16px; }
      th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
      th:last-child, td:last-child { text-align: right; }
      form { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
      input { padding: 6px 8px; }
      button { padding: 6px 10px; }
      .actions { display: flex; gap: 6px; }
      .error { color: #b00020; margin-top: 8px; }
      .success { color: #2e7d32; margin-top: 8px; }
    </style>
  </head>
  <body>
    <p><a href="/">&larr; Back to Dashboard</a></p>
    <h1>Rates</h1>
    <div class="actions">
      <button type="button" onclick="loadRates()">Refresh</button>
    </div>

    <table id="ratesTable">
      <thead>
        <tr>
          <th>Student</th>
          <th>Hourly Rate</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Update / Add Rate</h2>
    <form id="rateForm">
      <input type="text" id="student" placeholder="Student" required />
      <input type="number" id="rate" placeholder="Rate" step="0.01" required />
      <button type="submit">Save</button>
    </form>

    <h2>Delete Rate</h2>
    <form id="deleteForm">
      <input type="text" id="deleteStudent" placeholder="Student" required />
      <button type="submit">Delete</button>
    </form>

    <div id="message"></div>

    <script>
      async function loadRates() {
        const res = await fetch('/rates?format=json');
        const data = await res.json();
        const tbody = document.querySelector('#ratesTable tbody');
        tbody.innerHTML = '';
        (data.rates || []).forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${row.student}</td><td>${Number(row.rate).toFixed(2)}</td>`;
          tbody.appendChild(tr);
        });
      }

      function showMessage(text, type) {
        const el = document.getElementById('message');
        el.className = type;
        el.textContent = text;
      }

      document.getElementById('rateForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const student = document.getElementById('student').value;
        const rate = document.getElementById('rate').value;
        const res = await fetch('/rates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student, rate: parseFloat(rate) })
        });
        if (res.ok) {
          showMessage('Rate saved.', 'success');
          loadRates();
        } else {
          const err = await res.json();
          showMessage(err.error || 'Failed to save rate.', 'error');
        }
      });

      document.getElementById('deleteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const student = document.getElementById('deleteStudent').value;
        const res = await fetch('/rates', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student })
        });
        if (res.ok) {
          showMessage('Rate deleted.', 'success');
          loadRates();
        } else {
          const err = await res.json();
          showMessage(err.error || 'Failed to delete rate.', 'error');
        }
      });

      loadRates();
    </script>
  </body>
</html>
