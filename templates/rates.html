<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rates</title>
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --danger-color: #dc2626;
      --danger-hover: #b91c1c;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-color: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --radius: 12px;
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
      --input-focus: #2563eb;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --error-bg: #fee2e2;
      --error-text: #991b1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 24px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1,
    h2 {
      color: var(--text-color);
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 24px 0;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 32px 0 16px 0;
    }

    a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
    }

    a:hover {
      color: var(--primary-hover);
      text-decoration: underline;
    }

    a:focus {
      outline: 2px solid var(--primary-color);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .btn {
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
    }

    .btn-secondary {
      background-color: #f1f5f9;
      color: var(--text-color);
    }

    .btn-secondary:hover {
      background-color: #e2e8f0;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-danger {
      background-color: var(--danger-color);
      color: white;
    }

    .btn-danger:hover {
      background-color: var(--danger-hover);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
    }

    .btn-icon {
      padding: 6px 10px;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    th,
    td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background: #f8fafc;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background: #f8fafc;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .search-box {
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-color);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 140px;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-color);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input[type="number"] {
      max-width: 120px;
    }

    .autocomplete-wrapper {
      position: relative;
      flex: 1;
      min-width: 140px;
    }

    .autocomplete-wrapper input {
      width: 100%;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: var(--shadow);
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .autocomplete-list.show {
      display: block;
    }

    .autocomplete-item {
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .autocomplete-item:hover {
      background: #f1f5f9;
    }

    .actions-cell {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .inline-edit-input {
      width: 100px;
      padding: 6px 10px;
      font-size: 14px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 16px;
      font-weight: 500;
    }

    .message.success {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .message.error {
      background: var(--error-bg);
      color: var(--error-text);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: var(--shadow);
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.show .modal {
      transform: scale(1);
    }

    .modal h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    .modal p {
      color: var(--text-muted);
      margin: 0 0 20px 0;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .form-row {
        flex-direction: column;
      }

      input {
        width: 100%;
      }

      th,
      td {
        padding: 12px;
      }

      .actions-cell {
        flex-direction: column;
        gap: 4px;
      }

      .btn-sm {
        padding: 8px 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="/">&larr; Back to Dashboard</a>
    <h1>Rates</h1>

    <div class="card">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search clients..." />
      </div>
      <table id="ratesTable">
        <thead>
          <tr>
            <th>Client</th>
            <th>Hourly Rate</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="emptyState" class="empty-state" style="display: none;">No rates configured.</div>
    </div>

    <h2>Add / Update Rate</h2>
    <form id="rateForm" class="form-row">
      <div class="autocomplete-wrapper">
        <input type="text" id="client" placeholder="Client name" required autocomplete="off" />
        <div id="autocompleteList" class="autocomplete-list"></div>
      </div>
      <input type="number" id="rate" placeholder="Rate (€)" step="0.01" required />
      <button type="submit" class="btn btn-primary">Save</button>
    </form>

    <div id="message"></div>
  </div>

  <div id="confirmModal" class="modal-overlay">
    <div class="modal">
      <h3>Delete Rate</h3>
      <p id="confirmMessage">Are you sure you want to delete this rate?</p>
      <div class="modal-actions">
        <button type="button" id="confirmCancel" class="btn btn-secondary">Cancel</button>
        <button type="button" id="confirmDelete" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let ratesData = [];

    async function loadRates() {
      const res = await fetch('/rates?format=json');
      const data = await res.json();
      ratesData = data.rates || [];
      renderTable(ratesData);
    }

    function renderTable(rates) {
      const tbody = document.querySelector('#ratesTable tbody');
      const emptyState = document.getElementById('emptyState');
      const table = document.getElementById('ratesTable');

      tbody.innerHTML = '';

      if (!rates || rates.length === 0) {
        table.style.display = 'none';
        emptyState.style.display = 'block';
      } else {
        table.style.display = 'table';
        emptyState.style.display = 'none';
        rates.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.client}</td>
            <td>€${Number(row.rate).toFixed(2)}</td>
            <td>
              <button type="button" class="btn btn-sm btn-danger btn-delete" data-client="${row.client}">Delete</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }
    }

    function filterTable() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filtered = ratesData.filter(r => r.client.toLowerCase().includes(searchTerm));
      renderTable(filtered);
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.className = `message ${type}`;
      el.textContent = text;
      setTimeout(() => {
        el.className = '';
        el.textContent = '';
      }, 4000);
    }

    document.getElementById('searchInput').addEventListener('input', filterTable);

    document.getElementById('client').addEventListener('input', function () {
      const input = this.value.toLowerCase();
      const list = document.getElementById('autocompleteList');
      list.innerHTML = '';

      if (input.length === 0) {
        list.classList.remove('show');
        return;
      }

      const matches = ratesData.filter(r => r.client.toLowerCase().includes(input));
      if (matches.length === 0) {
        list.classList.remove('show');
        return;
      }

      matches.slice(0, 5).forEach(r => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.textContent = r.client;
        item.addEventListener('click', () => {
          document.getElementById('client').value = r.client;
          document.getElementById('rate').value = r.rate;
          list.classList.remove('show');
        });
        list.appendChild(item);
      });

      list.classList.add('show');
    });

    document.addEventListener('click', function (e) {
      if (!e.target.closest('.autocomplete-wrapper')) {
        document.getElementById('autocompleteList').classList.remove('show');
      }
    });

    document.getElementById('rateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const client = document.getElementById('client').value;
      const rate = document.getElementById('rate').value;

      const existing = ratesData.find(r => r.client.toLowerCase() === client.toLowerCase());
      const method = existing ? 'POST' : 'POST';
      const action = existing ? 'updated' : 'added';

      const res = await fetch('/rates', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({client, rate: parseFloat(rate)})
      });

      if (res.ok) {
        showMessage(`Rate ${action} successfully.`, 'success');
        document.getElementById('client').value = '';
        document.getElementById('rate').value = '';
        loadRates();
      } else {
        const err = await res.json();
        showMessage(err.error || 'Failed to save rate.', 'error');
      }
    });

    document.querySelector('#ratesTable').addEventListener('click', async (e) => {
      if (!e.target.classList.contains('btn-delete')) return;

      const row = e.target.closest('tr');
      if (!row) return;
      const client = e.target.dataset.client;
      document.getElementById('confirmMessage').textContent = `Are you sure you want to delete the rate for "${client}"?`;
      document.getElementById('confirmModal').classList.add('show');

      const modal = document.getElementById('confirmModal');
      const cleanup = () => {
        modal.classList.remove('show');
        modal.querySelector('#confirmCancel').removeEventListener('click', onCancel);
        modal.querySelector('#confirmDelete').removeEventListener('click', onDelete);
      };

      const onCancel = () => cleanup();
      const onDelete = async () => {
        cleanup();
        const res = await fetch('/rates', {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({client})
        });
        if (res.ok) {
          showMessage('Rate deleted successfully.', 'success');
          loadRates();
        } else {
          const err = await res.json();
          showMessage(err.error || 'Failed to delete rate.', 'error');
        }
      };

      modal.querySelector('#confirmCancel').addEventListener('click', onCancel);
      modal.querySelector('#confirmDelete').addEventListener('click', onDelete);
    }
    );

    loadRates();
  </script>
</body>

</html>
